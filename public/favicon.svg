<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <rect width="180" height="180" rx="40" fill="#fccd12"/>
  <!-- Wing Left -->
  <ellipse cx="65" cy="70" rx="18" ry="32" fill="#ffffff" transform="rotate(-30 65 70)" opacity="0.8" stroke="#000000" stroke-width="4"/>
  <!-- Wing Right -->
  <ellipse cx="115" cy="70" rx="18" ry="32" fill="#ffffff" transform="rotate(30 115 70)" opacity="0.8" stroke="#000000" stroke-width="4"/>
  <!-- Bee Body -->
  <rect x="65" y="80" width="50" height="60" rx="25" fill="#1e1e1e" stroke="#000000" stroke-width="4"/>
  <!-- Yellow Stripes -->
  <rect x="67" y="98" width="46" height="10" fill="#fccd12"/>
  <rect x="67" y="118" width="46" height="10" fill="#fccd12"/>
  <!-- Head -->
  <circle cx="90" cy="70" r="22" fill="#1e1e1e" stroke="#000000" stroke-width="4"/>
  <!-- Eyes -->
  <circle cx="82" cy="66" r="3" fill="#ffffff"/>
  <circle cx="98" cy="66" r="3" fill="#ffffff"/>
  <!-- Antennae -->
  <path d="M80,50 Q75,38 68,40" stroke="#000000" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M100,50 Q105,38 112,40" stroke="#000000" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Little Bee Stinger -->
  <polygon points="90,148 86,140 94,140" fill="#1e1e1e"/>
</svg>